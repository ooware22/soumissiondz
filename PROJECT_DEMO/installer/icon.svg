<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b5394"/>
      <stop offset="100%" stop-color="#073763"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>
  <!-- Drapeau algerien stylise vert + croissant -->
  <g transform="translate(128 128)">
    <circle r="62" fill="#fff" opacity="0.95"/>
    <circle r="62" fill="none" stroke="#fff" stroke-width="3"/>
    <!-- Croissant rouge -->
    <path d="M 18 -32 A 36 36 0 1 0 18 32 A 28 28 0 1 1 18 -32 Z" fill="#d12b1f"/>
    <!-- Etoile rouge -->
    <polygon points="32,-8 36,4 48,4 38,12 42,24 32,16 22,24 26,12 16,4 28,4"
             fill="#d12b1f" transform="translate(8 0)"/>
  </g>
  <!-- Texte SDZ en bas -->
  <text x="128" y="232" text-anchor="middle" fill="#fff"
        font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold"
        letter-spacing="4">SDZ</text>
</svg>
